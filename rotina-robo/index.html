<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#0D0B1E">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="description" content="A Rotina do Robô — Jogo educativo de lógica e ordenação. Estudo sequencial e divertido para crianças e estudantes. Integrado ao BrincaBytes.">
<meta property="og:title" content="🤖 A Rotina do Robô — Aprenda Ordenando">
<meta property="og:description" content="Ajude o robozinho a organizar sua rotina! 48 fases de lógica e diversão.">
<meta property="og:type" content="website">
<title>🤖 A Rotina do Robô — Edição Completa</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;700;900&family=JetBrains+Mono:wght@700&display=swap" rel="stylesheet">
<style>
:root {
  --bg:     #0D0B1E;
  --bg2:    #13102A;
  --card:   #1C1840;
  --card2:  #231F52;
  --border: rgba(255,255,255,0.07);
  --text:   #EAE6FF;
  --muted:  #7A769A;
  --roxo:   #8B7FFF;
  --rosa:   #FF6BAE;
  --verde:  #4EFACC;
  --azul:   #4FC8FF;
  --amarelo:#FFE14D;
  --laranja:#FF9A3C;
  --coral:  #FF6B6B;
  --menta:  #52E5A0;
  --lilas:  #C084FC;
  --ouro:   #FFD700;
  --shadow: 0 12px 40px rgba(0,0,0,0.5);
  --glass:  rgba(255,255,255,0.03);
  --glass-border: rgba(255,255,255,0.08);
  --glow-roxo: 0 0 35px rgba(139,127,255,0.4);
  --glow-verde: 0 0 35px rgba(78,250,204,0.4);
}
*{box-sizing:border-box;margin:0;padding:0;}
html{scroll-behavior:smooth;}
body{
  font-family:'Nunito',sans-serif;
  background:var(--bg);
  color:var(--text);
  min-height:100vh;
  overflow-x:hidden;
}

/* ─── CANVAS PARTÍCULAS ─── */
#particleCanvas{position:fixed;inset:0;z-index:0;pointer-events:none;opacity:0.5;}

/* ─── VIEWS ─── */
.view{display:none;position:relative;z-index:1;}
.view.ativa{display:block;}
#menu.ativa,#jogo.ativa,#ranking.ativa{display:flex;}

/* ══════════════ MENU ══════════════ */
#menu{
  flex-direction:column;align-items:center;
  padding:28px 16px 60px;min-height:100vh;
}

/* Cabeçalho do menu */
.menu-top{
  display:flex;align-items:center;justify-content:space-between;
  width:100%;max-width:760px;margin-bottom:32px;
}
.btn-ranking{
  display:flex;align-items:center;gap:6px;
  background:rgba(255,215,0,0.1);border:1px solid rgba(255,215,0,0.3);
  border-radius:50px;padding:10px 18px;
  color:var(--ouro);font-family:'Fredoka One',cursive;font-size:1rem;
  cursor:pointer;transition:all 0.2s;
}
.btn-ranking:hover{background:rgba(255,215,0,0.18);transform:translateY(-2px);}

/* Logo área */
.logo-area{text-align:center;margin-bottom:36px;}
.logo-robo{
  font-size:88px;display:block;
  animation:roboFloat 3.5s ease-in-out infinite;
  filter:drop-shadow(0 0 28px rgba(139,127,255,0.6));
}
@keyframes roboFloat{
  0%,100%{transform:translateY(0) rotate(-4deg) scale(1);}
  50%    {transform:translateY(-16px) rotate(4deg) scale(1.05);}
}
.titulo-game{
  font-family:'Fredoka One',cursive;
  font-size:clamp(2.2rem,7vw,3.6rem);
  line-height:1.1;
  background:linear-gradient(135deg,var(--roxo),var(--verde),var(--rosa));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
.subtitulo-game{
  font-size:1rem;color:var(--muted);font-weight:700;margin-top:6px;
}

/* Stats rápidos */
.stats-bar{
  display:flex;gap:12px;flex-wrap:wrap;justify-content:center;
  margin-bottom:32px;width:100%;max-width:760px;
}
.stat-pill{
  display:flex;align-items:center;gap:8px;
  background:var(--card);border:1px solid var(--border);
  border-radius:50px;padding:10px 18px;
  font-weight:900;font-size:0.9rem;
}
.stat-pill .sp-icon{font-size:1.3rem;}
.stat-pill .sp-val{color:var(--amarelo);}
.stat-pill .sp-lbl{color:var(--muted);font-size:0.8rem;}

/* Filtro de mundos */
.filtro{
  display:flex;gap:8px;flex-wrap:wrap;justify-content:center;
  margin-bottom:24px;width:100%;max-width:760px;
}
.filtro-btn{
  font-family:'Fredoka One',cursive;font-size:0.9rem;
  padding:8px 18px;border-radius:50px;border:2px solid var(--border);
  background:transparent;color:var(--muted);cursor:pointer;transition:all 0.2s;
}
.filtro-btn.ativo,.filtro-btn:hover{
  background:var(--card2);border-color:var(--roxo);color:var(--text);
}

/* Grid de mundos */
.mundos-grid{width:100%;max-width:760px;display:flex;flex-direction:column;gap:20px;}

.mundo{
  background:var(--card);border:1px solid var(--border);
  border-radius:26px;padding:20px;
  animation:fadeUp 0.5s ease both;
  transition:box-shadow 0.2s;
}
.mundo:hover{box-shadow:var(--shadow);}
@keyframes fadeUp{
  from{opacity:0;transform:translateY(20px);}
  to  {opacity:1;transform:translateY(0);}
}
.mundo-header{
  display:flex;align-items:center;gap:14px;margin-bottom:16px;
  padding-bottom:14px;border-bottom:1px solid var(--border);
}
.mundo-ico{
  font-size:2.2rem;
  background:rgba(255,255,255,0.06);
  border-radius:16px;width:56px;height:56px;
  display:flex;align-items:center;justify-content:center;flex-shrink:0;
}
.mundo-info h2{font-family:'Fredoka One',cursive;font-size:1.25rem;line-height:1.2;}
.mundo-info p{font-size:0.82rem;color:var(--muted);font-weight:700;margin-top:3px;}
.mundo-prog{
  margin-left:auto;text-align:right;flex-shrink:0;
}
.mundo-prog-txt{font-size:0.78rem;color:var(--muted);font-weight:900;margin-bottom:4px;}
.mundo-prog-bar{
  width:80px;height:6px;background:rgba(255,255,255,0.08);
  border-radius:6px;overflow:hidden;
}
.mundo-prog-fill{height:100%;border-radius:6px;transition:width 0.5s ease;}

.dif-tag{
  display:inline-block;border-radius:50px;padding:2px 10px;
  font-size:0.7rem;font-weight:900;margin-left:6px;letter-spacing:0.3px;
}
.tag-iniciante {background:rgba(92,234,212,0.15);color:var(--verde);}
.tag-facil     {background:rgba(82,229,160,0.15);color:var(--menta);}
.tag-medio     {background:rgba(255,225,77,0.15); color:var(--amarelo);}
.tag-dificil   {background:rgba(255,107,107,0.15);color:var(--coral);}
.tag-expert    {background:rgba(255,107,174,0.15);color:var(--rosa);}
.tag-mestre    {background:rgba(192,132,252,0.15);color:var(--lilas);}
.tag-lendario  {background:rgba(255,215,0,0.15);  color:var(--ouro);}

/* Fases */
.fases-row{display:flex;flex-wrap:wrap;gap:10px;}
.fase-btn{
  display:flex;flex-direction:column;align-items:center;gap:4px;
  background:rgba(255,255,255,0.04);border:2px solid rgba(255,255,255,0.08);
  border-radius:18px;padding:12px 10px;cursor:pointer;
  transition:all 0.2s;min-width:88px;flex:1;
  font-family:'Nunito',sans-serif;color:var(--text);
  position:relative;
}
.fase-btn:hover:not(.bloqueada){
  transform:translateY(-5px);
  box-shadow:var(--glow-roxo);border-color:rgba(139,127,255,0.5);
}
.fase-btn.concluida{
  border-color:rgba(78,250,204,0.4);
  background:rgba(78,250,204,0.06);
}
.fase-btn.bloqueada{opacity:0.3;cursor:not-allowed;pointer-events:none;}
.fase-emoji{font-size:1.9rem;}
.fase-nome{font-size:0.78rem;font-weight:900;text-align:center;line-height:1.2;}
.fase-stars{font-size:0.72rem;color:var(--amarelo);letter-spacing:2px;min-height:14px;}
.fase-num{font-size:0.68rem;color:var(--muted);font-weight:700;}
.fase-novo{
  position:absolute;top:-6px;right:-6px;
  background:var(--coral);color:#fff;
  font-size:0.6rem;font-weight:900;
  border-radius:50px;padding:2px 6px;
}

/* ══════════════ JOGO ══════════════ */
#jogo{
  flex-direction:column;align-items:center;
  padding:18px 14px 44px;min-height:100vh;
}

.jogo-header{
  width:100%;max-width:660px;
  display:flex;align-items:center;gap:10px;margin-bottom:16px;
}
.btn-voltar{
  background:rgba(255,255,255,0.07);border:1px solid var(--border);
  border-radius:50px;padding:9px 16px;
  color:var(--text);font-family:'Fredoka One',cursive;font-size:0.95rem;
  cursor:pointer;transition:all 0.2s;flex-shrink:0;
}
.btn-voltar:hover{background:rgba(255,255,255,0.13);transform:translateX(-2px);}

.prog-wrap{flex:1;display:flex;flex-direction:column;gap:4px;}
.prog-bar{
  background:rgba(255,255,255,0.07);border-radius:50px;
  height:8px;overflow:hidden;
}
.prog-fill{
  height:100%;border-radius:50px;
  background:linear-gradient(90deg,var(--roxo),var(--verde));
  transition:width 0.5s ease;
}
.prog-lbl{font-size:0.75rem;font-weight:900;color:var(--muted);text-align:right;}

/* Cronômetro */
.timer-wrap{
  display:flex;align-items:center;gap:6px;
  background:var(--card);border:1px solid var(--border);
  border-radius:50px;padding:8px 16px;flex-shrink:0;
}
.timer-ico{font-size:1.1rem;}
.timer-num{
  font-family:'Fredoka One',cursive;font-size:1.2rem;
  color:var(--verde);min-width:52px;text-align:center;
  transition:color 0.3s;
}
.timer-num.urgente{color:var(--coral);animation:pulse 0.5s ease infinite alternate;}
@keyframes pulse{from{transform:scale(1);}to{transform:scale(1.12);}}

/* Info da fase */
.fase-info-card{
  width:100%;max-width:660px;
  display:flex;align-items:center;gap:14px;
  background:var(--card);border:1px solid var(--border);
  border-radius:22px;padding:16px 20px;margin-bottom:14px;
}
.fi-icon{font-size:3.2rem;filter:drop-shadow(0 0 12px rgba(139,127,255,0.4));}
.fi-texto h2{font-family:'Fredoka One',cursive;font-size:clamp(1.2rem,4vw,1.7rem);}
.fi-texto p{font-size:0.85rem;color:var(--muted);font-weight:700;margin-top:2px;}
.fi-badge{
  display:flex;align-items:center;gap:5px;
  font-size:0.75rem;font-weight:900;color:var(--muted);
  margin-top:5px;
}

/* Blocos */
.zona-drop{
  width:100%;max-width:660px;
  display:flex;flex-direction:column;gap:10px;
  margin-bottom:18px;
}
.bloco{
  display:flex;align-items:center;gap:12px;
  padding:14px 18px;border-radius:18px;
  font-family:'Fredoka One',cursive;
  font-size:clamp(1rem,3.2vw,1.3rem);
  color:#fff;cursor:grab;user-select:none;
  border:3px solid rgba(255,255,255,0.12);
  transition:transform 0.15s,box-shadow 0.15s,opacity 0.15s,border-color 0.2s;
  -webkit-tap-highlight-color:transparent;
  position:relative;overflow:hidden;
}
.bloco::before{
  content:'';position:absolute;inset:0;
  background:linear-gradient(135deg,rgba(255,255,255,0.08),transparent);
  pointer-events:none;
}
.bloco:active{cursor:grabbing;}
.bloco .b-num{
  background:rgba(0,0,0,0.25);border-radius:50%;
  width:34px;height:34px;display:flex;align-items:center;justify-content:center;
  font-size:0.95rem;flex-shrink:0;border:2px solid rgba(255,255,255,0.25);
}
.bloco .b-emoji{font-size:clamp(1.5rem,4.5vw,2rem);flex-shrink:0;}
.bloco .b-texto{flex:1;}
.bloco .b-drag{font-size:1.1rem;opacity:0.35;flex-shrink:0;}

.bloco.dragging {opacity:0.35;transform:scale(0.97);}
.bloco.drag-over{transform:scale(1.04);border-color:rgba(255,255,255,0.8);box-shadow:0 0 28px rgba(139,127,255,0.5);}

/* 16 gradientes para blocos */
.bc-0 {background:linear-gradient(135deg,#FF9F1C,#FFBF69);}
.bc-1 {background:linear-gradient(135deg,#4ECDC4,#2A9D8F);}
.bc-2 {background:linear-gradient(135deg,#FF6B9D,#C9184A);}
.bc-3 {background:linear-gradient(135deg,#7C6AFF,#4A90D9);}
.bc-4 {background:linear-gradient(135deg,#5CDB95,#379683);}
.bc-5 {background:linear-gradient(135deg,#E29578,#C77DFF);}
.bc-6 {background:linear-gradient(135deg,#F72585,#B5179E);}
.bc-7 {background:linear-gradient(135deg,#3A86FF,#0077B6);}
.bc-8 {background:linear-gradient(135deg,#FB5607,#FF9F1C);}
.bc-9 {background:linear-gradient(135deg,#06D6A0,#118577);}
.bc-10{background:linear-gradient(135deg,#D62828,#F77F00);}
.bc-11{background:linear-gradient(135deg,#4361EE,#7209B7);}
.bc-12{background:linear-gradient(135deg,#52B788,#40916C);}
.bc-13{background:linear-gradient(135deg,#E63946,#A8DADC);}
.bc-14{background:linear-gradient(135deg,#8338EC,#3A86FF);}
.bc-15{background:linear-gradient(135deg,#FF006E,#8338EC);}

/* Caixas auxiliares */
.dica-box{
  width:100%;max-width:660px;
  background:rgba(255,225,77,0.08);border:2px solid rgba(255,225,77,0.25);
  border-radius:16px;padding:13px 18px;
  font-size:0.92rem;font-weight:700;color:var(--amarelo);
  display:none;margin-bottom:12px;animation:fadeUp 0.3s ease;
}
.feedback-erro{
  width:100%;max-width:660px;
  background:rgba(255,107,107,0.09);border:2px solid rgba(255,107,107,0.25);
  border-radius:16px;padding:13px 18px;
  font-size:1rem;font-weight:900;font-family:'Fredoka One',cursive;
  color:var(--coral);text-align:center;
  display:none;margin-bottom:12px;animation:shakeAnim 0.4s ease;
}
@keyframes shakeAnim{
  0%,100%{transform:translateX(0);}
  20%    {transform:translateX(-9px);}
  40%    {transform:translateX(9px);}
  60%    {transform:translateX(-6px);}
  80%    {transform:translateX(6px);}
}

/* Botões de ação */
.acoes{
  width:100%;max-width:660px;
  display:flex;gap:10px;flex-wrap:wrap;justify-content:center;
}
.btn-acao{
  font-family:'Fredoka One',cursive;
  font-size:clamp(0.95rem,2.8vw,1.15rem);
  padding:12px 22px;border:none;border-radius:50px;
  cursor:pointer;transition:all 0.18s;flex:1;min-width:120px;
}
.btn-acao:hover {transform:translateY(-3px);}
.btn-acao:active{transform:translateY(0);}
.btn-verificar {background:linear-gradient(135deg,var(--roxo),#5B4FCC);color:#fff;box-shadow:0 4px 20px rgba(139,127,255,0.4);}
.btn-dica      {background:rgba(255,255,255,0.07);color:var(--text);border:1px solid var(--border);}
.btn-embaralhar{background:rgba(255,255,255,0.07);color:var(--text);border:1px solid var(--border);}

/* Instruções */
.instrucao-bar{
  width:100%;max-width:660px;
  background:rgba(255,255,255,0.04);border:1px solid var(--border);
  border-radius:14px;padding:11px 16px;
  font-size:0.88rem;font-weight:700;color:var(--muted);
  margin-bottom:14px;
}

/* ══════════════ MODAL CELEBRAÇÃO ══════════════ */
.overlay{
  position:fixed;inset:0;z-index:300;
  background:rgba(0,0,0,0.75);
  display:none;align-items:center;justify-content:center;
  backdrop-filter:blur(8px);
}
.overlay.ativo{display:flex;}

.modal-cel{
  background:linear-gradient(160deg,#1A1640,#241D5C);
  border:2px solid rgba(139,127,255,0.35);
  border-radius:32px;padding:38px 30px;
  max-width:440px;width:92%;text-align:center;
  box-shadow:0 0 80px rgba(139,127,255,0.25);
  animation:modalPop 0.5s cubic-bezier(0.175,0.885,0.32,1.275);
  position:relative;overflow:hidden;
}
@keyframes modalPop{
  from{transform:scale(0.4) rotate(-6deg);opacity:0;}
  to  {transform:scale(1)   rotate(0deg); opacity:1;}
}
.cel-firework{position:absolute;inset:0;pointer-events:none;}
.cel-emoji{
  font-size:80px;display:block;margin-bottom:10px;
  animation:bounce 0.9s ease infinite alternate;
}
@keyframes bounce{
  from{transform:translateY(0) scale(1);}
  to  {transform:translateY(-16px) scale(1.1);}
}
.cel-titulo{
  font-family:'Fredoka One',cursive;font-size:1.9rem;margin-bottom:7px;
  background:linear-gradient(135deg,var(--amarelo),var(--rosa));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
.cel-msg{font-size:0.97rem;color:var(--muted);font-weight:700;margin-bottom:8px;}
.cel-stars{font-size:2rem;letter-spacing:6px;margin-bottom:4px;}
.cel-tempo{
  font-size:0.88rem;color:var(--verde);font-weight:900;
  margin-bottom:18px;
}
.cel-pts{
  background:rgba(255,215,0,0.1);border:1px solid rgba(255,215,0,0.25);
  border-radius:50px;padding:8px 20px;display:inline-block;
  font-family:'Fredoka One',cursive;font-size:1.1rem;color:var(--ouro);
  margin-bottom:20px;
}
.cel-botoes{display:flex;gap:10px;flex-wrap:wrap;justify-content:center;}
.btn-cel{
  font-family:'Fredoka One',cursive;font-size:1.05rem;
  padding:12px 22px;border:none;border-radius:50px;
  cursor:pointer;transition:all 0.18s;flex:1;min-width:120px;
}
.btn-cel:hover{transform:translateY(-3px);}
.btn-proxima {background:linear-gradient(135deg,var(--verde),#2BC08A);color:#0D0B1E;font-weight:900;}
.btn-menu-cel{background:rgba(255,255,255,0.08);color:var(--text);border:1px solid var(--border);}

/* Confetes & partículas */
.confete{
  position:absolute;border-radius:3px;
  animation:confeteCair linear forwards;pointer-events:none;
}
@keyframes confeteCair{
  0%  {transform:translateY(-20px) rotate(0deg);  opacity:1;}
  100%{transform:translateY(550px) rotate(800deg);opacity:0;}
}
.sparkle{
  position:absolute;pointer-events:none;
  animation:sparkleAnim ease-out forwards;
}
@keyframes sparkleAnim{
  0%  {transform:scale(0) translate(0,0);opacity:1;}
  100%{transform:scale(1.5) translate(var(--tx),var(--ty));opacity:0;}
}

/* ══════════════ RANKING ══════════════ */
#ranking{
  flex-direction:column;align-items:center;
  padding:28px 16px 60px;min-height:100vh;
}
.ranking-header{
  width:100%;max-width:600px;
  display:flex;align-items:center;gap:12px;margin-bottom:28px;
}
.ranking-titulo{
  font-family:'Fredoka One',cursive;
  font-size:clamp(1.6rem,5vw,2.4rem);flex:1;
  background:linear-gradient(135deg,var(--ouro),var(--laranja));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
.ranking-lista{width:100%;max-width:600px;display:flex;flex-direction:column;gap:10px;}
.rank-item{
  display:flex;align-items:center;gap:14px;
  background:var(--card);border:1px solid var(--border);
  border-radius:20px;padding:16px 20px;
  animation:fadeUp 0.4s ease both;
}
.rank-item.top1{border-color:rgba(255,215,0,0.4);background:rgba(255,215,0,0.06);}
.rank-item.top2{border-color:rgba(192,192,192,0.35);}
.rank-item.top3{border-color:rgba(205,127,50,0.35);}
.rank-pos{font-family:'Fredoka One',cursive;font-size:1.5rem;width:40px;text-align:center;flex-shrink:0;}
.rank-medal{font-size:1.8rem;flex-shrink:0;}
.rank-info{flex:1;}
.rank-nome{font-family:'Fredoka One',cursive;font-size:1.1rem;}
.rank-detalhe{font-size:0.8rem;color:var(--muted);font-weight:700;margin-top:2px;}
.rank-pts{
  font-family:'Fredoka One',cursive;font-size:1.3rem;
  color:var(--amarelo);
}

.ranking-vazio{
  text-align:center;padding:50px 20px;
  color:var(--muted);font-weight:700;font-size:1rem;
}
.ranking-vazio span{font-size:3rem;display:block;margin-bottom:14px;}

/* ══════════════ INPUT NOME ══════════════ */
.overlay-nome{
  position:fixed;inset:0;z-index:400;
  background:rgba(0,0,0,0.8);
  display:none;align-items:center;justify-content:center;
  backdrop-filter:blur(8px);
}
.overlay-nome.ativo{display:flex;}
.modal-nome{
  background:linear-gradient(160deg,#1A1640,#241D5C);
  border:2px solid rgba(139,127,255,0.35);
  border-radius:28px;padding:36px 28px;
  max-width:400px;width:90%;text-align:center;

/* ─── CUSTOM MODALS & TOASTS ─── */
.modal-overlay {
  position:fixed;inset:0;z-index:500;

  animation:fadeIn 0.3s ease;
}
.modal-overlay.ativo {display:flex;}
.modal-custom {
  background:var(--card);border:1.5px solid var(--glass-border);

.modal-custom h2 {font-family:'Fredoka One',cursive;font-size:1.6rem;color:var(--text);margin-bottom:12px;}

}
.btn-modal-sim {background:var(--roxo);color:#fff;}
.btn-modal-nao {background:rgba(255,255,255,0.08);color:var(--muted);border:1px solid var(--glass-border);}

.toast-container {
  position:fixed;bottom:24px;left:50%;transform:translateX(-50%);

}
.toast {
  background:var(--card);border:1px solid var(--glass-border);
  padding:12px 24px;border-radius:50px;color:var(--text);

}
@keyframes fadeIn {from{opacity:0;}to{opacity:1;}}
@keyframes toastIn {from{transform:translateY(100px);opacity:0;}to{transform:translateY(0);opacity:1;}}
@keyframes fadeOut {from{opacity:1;}to{opacity:0;}}

(function(){
  const canvas = document.getElementById('particleCanvas');
  const ctx    = canvas.getContext('2d');
  let parts    = [];

  function resize(){canvas.width=window.innerWidth;canvas.height=window.innerHeight;}
  resize();
  window.addEventListener('resize',resize);

  for(let i=0;i<60;i++){
    parts.push({
      x:Math.random()*window.innerWidth,
      y:Math.random()*window.innerHeight,
      r:Math.random()*2+0.5,
      vx:(Math.random()-0.5)*0.3,
      vy:(Math.random()-0.5)*0.3,
      a:Math.random(),
      da:(Math.random()-0.5)*0.005,
    });
  }

  function animate(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    parts.forEach(p=>{
      p.x+=p.vx; p.y+=p.vy; p.a+=p.da;
      if(p.a<0)p.a=0,p.da*=-1;
      if(p.a>1)p.a=1,p.da*=-1;
      if(p.x<0)p.x=canvas.width; if(p.x>canvas.width)p.x=0;
      if(p.y<0)p.y=canvas.height;if(p.y>canvas.height)p.y=0;
      ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
      ctx.fillStyle=`rgba(255,255,255,${p.a*0.6})`;ctx.fill();
    });
    requestAnimationFrame(animate);
  }
  animate();
})();

//  ÁUDIO (Web Audio API)
// ═══════════════════════════════════════════════════════════════
const AC = window.AudioContext ? new AudioContext() : null;
function beep(freq,dur,type='sine',vol=0.3){
  if(!AC) return;
  try{
    const g=AC.createGain(); const o=AC.createOscillator();
    o.type=type; o.frequency.value=freq;
    g.gain.setValueAtTime(vol,AC.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001,AC.currentTime+dur);
    o.connect(g); g.connect(AC.destination);
    o.start(AC.currentTime); o.stop(AC.currentTime+dur);
  }catch(e){}
}

function showConfirm(title, msg, onConfirm) {
  const overlay = document.getElementById('modalOverlay');
  document.getElementById('modalTitle').textContent = title;
  document.getElementById('modalMsg').textContent = msg;
  overlay.classList.add('ativo');

  const btnSim = document.getElementById('btnModalSim');
  const btnNao = document.getElementById('btnModalNao');

  const close = () => { overlay.classList.remove('ativo'); };
  
  btnSim.onclick = () => { onConfirm(); close(); };
  btnNao.onclick = () => { close(); };
}

function showToast(msg) {
  const container = document.getElementById('toastContainer');
  const toast = document.createElement('div');
  toast.className = 'toast';
  toast.innerHTML = `<span>✨</span> ${msg}`;
  container.appendChild(toast);
  setTimeout(() => toast.remove(), 3000);
}

function isBloqueado(mIdx, fIdx){
  if(mIdx===0) return false;
  const mAnt = ACERVO[mIdx-1];
  return fIdx===0 ? !mAnt.fases.every(f=>progresso[f.id]?.concluida) : false;
}
function calcStars(){
  if(tentativas===1&&!dicaUsada) return 3;
  if(tentativas<=2&&!dicaUsada)  return 2;
  return 1;
}
function calcPts(stars, secs, blocos){
  const base = blocos * 100;
  const bonus = stars===3?300:stars===2?150:0;
  const tempo = Math.max(0, 500 - secs*5);
  return base + bonus + tempo;
}
function fmtTempo(s){
  return `${Math.floor(s/60)}:${String(s%60).padStart(2,'0')}`;
}
function totalFases(){return ACERVO.reduce((s,m)=>s+m.fases.length,0);}
function fasesConcluidasTotal(){return Object.values(progresso).filter(v=>v.concluida).length;}
function totalEstrelas(){return Object.values(progresso).reduce((s,v)=>s+(v.stars||0),0);}

// ═══════════════════════════════════════════════════════════════
//  STATS BAR
// ═══════════════════════════════════════════════════════════════
function renderStats(){
  const bar = document.getElementById('statsBar');
  const conc = fasesConcluidasTotal();
  const tot  = totalFases();
  const est  = totalEstrelas();
  const pts  = Object.values(progresso).reduce((s,v)=>s+(v.pts||0),0);
  bar.innerHTML=`
    <div class="stat-pill"><span class="sp-icon">🎮</span><span class="sp-val">${conc}/${tot}</span><span class="sp-lbl">Fases</span></div>
    <div class="stat-pill"><span class="sp-icon">⭐</span><span class="sp-val">${est}</span><span class="sp-lbl">Estrelas</span></div>
    <div class="stat-pill"><span class="sp-icon">🏆</span><span class="sp-val">${pts.toLocaleString('pt-BR')}</span><span class="sp-lbl">Pontos</span></div>
    <div class="stat-pill"><span class="sp-icon">👤</span><span class="sp-val">${nomeJogador||'?'}</span><span class="sp-lbl">Jogador</span></div>`;
}

// ═══════════════════════════════════════════════════════════════
//  FILTRO
// ═══════════════════════════════════════════════════════════════
let filtroAtivo = 'todos';
function filtrar(btn){
  document.querySelectorAll('.filtro-btn').forEach(b=>b.classList.remove('ativo'));
  btn.classList.add('ativo');
  filtroAtivo = btn.dataset.filtro;
  renderMenu(false);
}

// ═══════════════════════════════════════════════════════════════
//  RENDER MENU
// ═══════════════════════════════════════════════════════════════
function renderMenu(full=true){
  if(full){ renderStats(); }
  const grid = document.getElementById('mundosGrid');
  grid.innerHTML='';

  ACERVO.forEach((mundo,mIdx)=>{
    if(filtroAtivo!=='todos' && mundo.dif!==filtroAtivo) return;

    const conc   = mundo.fases.filter(f=>progresso[f.id]?.concluida).length;
    const pct    = Math.round((conc/mundo.fases.length)*100);
    const bloq   = isBloqueado(mIdx,0);

    const div = document.createElement('div');
    div.className='mundo';
    div.style.animationDelay=`${mIdx*0.07}s`;
    div.style.borderTop=`4px solid ${mundo.cor}`;
    if(bloq) div.style.opacity='0.45';

    const fasesHTML = mundo.fases.map((f,fIdx)=>{
      const fb   = isBloqueado(mIdx,fIdx) || (fIdx>0 && isBloqueado(mIdx,0));
      const fc   = !!progresso[f.id]?.concluida;
      const st   = progresso[f.id]?.stars||0;
      const nov  = !fc && !fb && fIdx===0 && conc===0 && mIdx===0 ? '<span class="fase-novo">NOVO</span>':
                   !fc && !fb && fIdx===conc ? '<span class="fase-novo">▶</span>':'';
      const sStr = fc?'★'.repeat(st)+'☆'.repeat(3-st):'○○○';
      return `<button class="fase-btn ${fb?'bloqueada':''} ${fc?'concluida':''}"
        onclick="iniciarFase(${mIdx},'${f.id}')">
        ${nov}
        <span class="fase-emoji">${fb?'🔒':f.icon}</span>
        <span class="fase-nome">${f.nome}</span>
        <span class="fase-stars">${sStr}</span>
        <span class="fase-num">Fase ${fIdx+1}</span>
      </button>`;
    }).join('');

    div.innerHTML=`
      <div class="mundo-header">
        <div class="mundo-ico">${mundo.ico}</div>
        <div class="mundo-info">
          <h2>${mundo.nome}<span class="dif-tag tag-${mundo.dif}">${mundo.tag}</span></h2>
          <p>${mundo.fases.length} fases • ${conc} concluídas</p>
        </div>
        <div class="mundo-prog">
          <div class="mundo-prog-txt">${pct}%</div>
          <div class="mundo-prog-bar">
            <div class="mundo-prog-fill" style="width:${pct}%;background:${mundo.cor}"></div>
          </div>
        </div>
      </div>
      <div class="fases-row">${fasesHTML}</div>`;
    grid.appendChild(div);
  });
}

// ═══════════════════════════════════════════════════════════════
//  INICIAR FASE
// ═══════════════════════════════════════════════════════════════
function iniciarFase(mIdx, faseId){
  mundoAtual = ACERVO[mIdx];
  faseAtual  = mundoAtual.fases.find(f=>f.id===faseId);
  if(!faseAtual) return;
  tentativas=0; dicaUsada=false;

  const fIdx = mundoAtual.fases.indexOf(faseAtual);
  const pct  = ((fIdx+1)/mundoAtual.fases.length)*100;
  document.getElementById('progFill').style.width=pct+'%';
  document.getElementById('progLbl').textContent=`${fIdx+1}/${mundoAtual.fases.length}`;

  document.getElementById('fiIcon').textContent = faseAtual.icon;
  document.getElementById('fiNome').textContent = faseAtual.nome;
  document.getElementById('fiDesc').textContent = faseAtual.desc;
  document.getElementById('fiBadge').textContent= `${mundoAtual.ico} ${mundoAtual.nome}`;

  document.getElementById('dicaBox').style.display='none';
  document.getElementById('feedbackErro').style.display='none';

  iniciarTimer();
  embaralhar();
  irView('jogo');
}

// ═══════════════════════════════════════════════════════════════
//  TIMER
// ═══════════════════════════════════════════════════════════════
function iniciarTimer(){
  clearInterval(timerInt);
  timerSeg=0;
  atualizarTimer();
  timerInt=setInterval(()=>{
    timerSeg++;
    atualizarTimer();
  },1000);
}
function atualizarTimer(){
  const el=document.getElementById('timerNum');
  el.textContent=fmtTempo(timerSeg);
  el.className='timer-num'+(timerSeg>60?' urgente':'');
}
function pararTimer(){ clearInterval(timerInt); }

// ═══════════════════════════════════════════════════════════════
//  RENDER BLOCOS
// ═══════════════════════════════════════════════════════════════
function renderBlocos(){
  const zona=document.getElementById('zonadrop');
  zona.innerHTML='';
  ordemAtual.forEach((id,idx)=>{
    const d=faseAtual.blocos.find(b=>b.id===id);
    const el=document.createElement('div');
    el.className=`bloco bc-${idx%16}`;
    el.dataset.id=id; el.dataset.idx=idx; el.draggable=true;
    el.innerHTML=`<div class="b-num">${idx+1}</div><span class="b-emoji">${d.e}</span><span class="b-texto">${d.t}</span><span class="b-drag">⠿</span>`;
    el.addEventListener('dragstart',onDragStart);
    el.addEventListener('dragover', onDragOver);
    el.addEventListener('dragenter',onDragEnter);
    el.addEventListener('dragleave',onDragLeave);
    el.addEventListener('drop',     onDrop);
    el.addEventListener('dragend',  onDragEnd);
    el.addEventListener('touchstart',onTouchStart,{passive:true});
    el.addEventListener('touchmove', onTouchMove, {passive:false});
    el.addEventListener('touchend',  onTouchEnd);
    zona.appendChild(el);
  });
  document.getElementById('feedbackErro').style.display='none';
}

// ═══════════════════════════════════════════════════════════════
//  DRAG & DROP
// ═══════════════════════════════════════════════════════════════
function onDragStart(e){dragSrcIdx=+this.dataset.idx;this.classList.add('dragging');e.dataTransfer.effectAllowed='move';}
function onDragOver(e){e.preventDefault();e.dataTransfer.dropEffect='move';}
function onDragEnter(e){e.preventDefault();if(+this.dataset.idx!==dragSrcIdx)this.classList.add('drag-over');}
function onDragLeave(){this.classList.remove('drag-over');}
function onDrop(e){
  e.preventDefault();
  const dest=+this.dataset.idx;
  if(dragSrcIdx!==null&&dragSrcIdx!==dest){trocar(dragSrcIdx,dest);somDrag();}
  this.classList.remove('drag-over');
}
function onDragEnd(){this.classList.remove('dragging');dragSrcIdx=null;}

// ─── TOUCH ───
function onTouchStart(e){
  const t=e.touches[0];touchSrcIdx=+this.dataset.idx;
  const r=this.getBoundingClientRect();
  touchOffX=t.clientX-r.left;touchOffY=t.clientY-r.top;
  touchGhost=this.cloneNode(true);
  touchGhost.style.cssText=`position:fixed;z-index:999;width:${r.width}px;pointer-events:none;opacity:0.85;left:${t.clientX-touchOffX}px;top:${t.clientY-touchOffY}px;margin:0;transform:scale(1.05);transition:none;`;
  document.body.appendChild(touchGhost);
  this.style.opacity='0.35';
}
function onTouchMove(e){
  e.preventDefault();
  const t=e.touches[0];
  if(touchGhost){touchGhost.style.left=`${t.clientX-touchOffX}px`;touchGhost.style.top=`${t.clientY-touchOffY}px`;}
  const under=document.elementFromPoint(t.clientX,t.clientY)?.closest('.bloco');
  document.querySelectorAll('.bloco').forEach(b=>b.classList.remove('drag-over'));
  if(under&&+under.dataset.idx!==touchSrcIdx)under.classList.add('drag-over');
}
function onTouchEnd(e){
  if(touchGhost){touchGhost.remove();touchGhost=null;}
  const t=e.changedTouches[0];
  const under=document.elementFromPoint(t.clientX,t.clientY)?.closest('.bloco');
  document.querySelectorAll('.bloco').forEach(b=>{b.classList.remove('drag-over');b.style.opacity='';});
  if(under){const di=+under.dataset.idx;if(touchSrcIdx!==null&&touchSrcIdx!==di){trocar(touchSrcIdx,di);somDrag();}}
  touchSrcIdx=null;
}

function trocar(a,b){
  [ordemAtual[a],ordemAtual[b]]=[ordemAtual[b],ordemAtual[a]];
  renderBlocos();
}

// ═══════════════════════════════════════════════════════════════
//  LÓGICA DE JOGO
// ═══════════════════════════════════════════════════════════════
function embaralhar(){
  let arr=[...faseAtual.ordem];
  for(let i=arr.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[arr[i],arr[j]]=[arr[j],arr[i]];}
  if(arr.every((v,i)=>v===faseAtual.ordem[i]))[arr[0],arr[1]]=[arr[1],arr[0]];
  ordemAtual=arr;
  renderBlocos();
}

function verificar(){
  tentativas++;
  const ok=ordemAtual.every((id,i)=>id===faseAtual.ordem[i]);
  if(ok){
    pararTimer();
    somAcerto();
    const stars=calcStars();
    const pts=calcPts(stars,timerSeg,faseAtual.blocos.length);
    const melhor=progresso[faseAtual.id];
    if(!melhor?.concluida||stars>(melhor.stars||0)){
      progresso[faseAtual.id]={concluida:true,stars,pts,tempo:timerSeg};
      salvarProg();
      atualizarRanking(pts);
    }
    mostrarCelebracao(stars,pts);
  } else {
    somErro();
    const fb=document.getElementById('feedbackErro');
    fb.style.display='block';
    fb.style.animation='none';void fb.offsetWidth;
    fb.style.animation='shakeAnim 0.4s ease';
  }
}

function mostrarDica(){
  dicaUsada=true;
  const db=document.getElementById('dicaBox');
  db.textContent=`💡 ${faseAtual.dica}`;
  db.style.display='block';
}

// ═══════════════════════════════════════════════════════════════
//  RANKING
// ═══════════════════════════════════════════════════════════════
function atualizarRanking(ptsNovos){
  if(!nomeJogador) return;
  const idx=rankingData.findIndex(r=>r.nome===nomeJogador);
  const totalPts=Object.values(progresso).reduce((s,v)=>s+(v.pts||0),0);
  const totalEst=totalEstrelas();
  const entry={nome:nomeJogador,pts:totalPts,estrelas:totalEst,fases:fasesConcluidasTotal(),data:new Date().toLocaleDateString('pt-BR')};
  if(idx>=0)rankingData[idx]=entry; else rankingData.push(entry);
  rankingData.sort((a,b)=>b.pts-a.pts);
  if(rankingData.length>20)rankingData=rankingData.slice(0,20);
  salvarRank();
}

function irRanking(){
  renderRanking();
  irView('ranking');
}

function renderRanking(){
  const lista=document.getElementById('rankingLista');
  if(!rankingData.length){
    lista.innerHTML='<div class="ranking-vazio"><span>🏆</span>Nenhuma pontuação ainda!<br>Complete fases para aparecer aqui.</div>';
    return;
  }
  const medals=['🥇','🥈','🥉'];
  lista.innerHTML=rankingData.map((r,i)=>{
    const cls=i===0?'top1':i===1?'top2':i===2?'top3':'';
    return`<div class="rank-item ${cls}" style="animation-delay:${i*0.06}s">
      <div class="rank-pos">${i+1}º</div>
      <div class="rank-medal">${medals[i]||'🎖️'}</div>
      <div class="rank-info">
        <div class="rank-nome">${r.nome}</div>
        <div class="rank-detalhe">⭐${r.estrelas} estrelas • 🎮${r.fases} fases • ${r.data}</div>
      </div>
      <div class="rank-pts">${r.pts.toLocaleString('pt-BR')}</div>
    </div>`;
  }).join('');
}

function limparRanking(){
  if(confirm('Limpar o ranking?')){ rankingData=[]; salvarRank(); renderRanking(); }
}

// ═══════════════════════════════════════════════════════════════
//  CELEBRAÇÃO
// ═══════════════════════════════════════════════════════════════
const MSGS=[
  "O Robozinho ficou muito feliz! 🤖💙",
  "Você é incrível! Continue assim! ⭐",
  "Missão cumprida com sucesso! 🚀",
  "Que sequência perfeita! 🎯",
  "O Robô aprendeu tudo com você! 🧠✨",
  "Você é um gênio da ordenação! 🏆",
  "Incrível! O Robô está orgulhoso! 🤖❤️",
];

function mostrarCelebracao(stars,pts){
  somCelebrar();
  const emojis=['🥉','🥈','🏆'];
  document.getElementById('celEmoji').textContent  = emojis[stars-1];
  document.getElementById('celTitulo').textContent = stars===3?'Perfeito! 3 Estrelas! 🌟':stars===2?'Muito bem! 2 Estrelas!':'Conseguiu! 1 Estrela!';
  document.getElementById('celMsg').textContent    = MSGS[Math.floor(Math.random()*MSGS.length)];
  document.getElementById('celStars').textContent  = '★'.repeat(stars)+'☆'.repeat(3-stars);
  document.getElementById('celTempo').textContent  = `⏱️ Tempo: ${fmtTempo(timerSeg)}`;
  document.getElementById('celPts').textContent    = `+${pts.toLocaleString('pt-BR')} pontos!`;

  const mIdx=ACERVO.indexOf(mundoAtual);
  const fIdx=mundoAtual.fases.indexOf(faseAtual);
  const temProx=fIdx<mundoAtual.fases.length-1||(mIdx<ACERVO.length-1&&!isBloqueado(mIdx+1,0));
  document.getElementById('btnProxima').style.display=temProx?'':'none';

  gerarConfetes();
  gerarSparkles();
  document.getElementById('overlay').classList.add('ativo');
}

function gerarConfetes(){
  const modal=document.getElementById('modalCel');
  modal.querySelectorAll('.confete').forEach(c=>c.remove());
  const cores=['#8B7FFF','#FF6BAE','#FFE14D','#4EFACC','#4FC8FF','#FF9A3C','#FF6B6B','#52E5A0'];
  for(let i=0;i<80;i++){
    const c=document.createElement('div');c.className='confete';
    c.style.cssText=`left:${Math.random()*100}%;top:-20px;background:${cores[Math.floor(Math.random()*cores.length)]};animation-duration:${1.5+Math.random()*2.5}s;animation-delay:${Math.random()*1.5}s;width:${5+Math.random()*9}px;height:${9+Math.random()*9}px;transform:rotate(${Math.random()*360}deg);border-radius:${Math.random()>0.5?'50%':'3px'};`;
    modal.appendChild(c);
    setTimeout(()=>c.remove(),5000);
  }
}

function gerarSparkles(){
  const fw=document.getElementById('celFirework');
  fw.innerHTML='';
  for(let i=0;i<24;i++){
    const s=document.createElement('div');s.className='sparkle';
    const ang=Math.random()*360;
    const dist=60+Math.random()*80;
    const tx=Math.cos(ang*Math.PI/180)*dist+'px';
    const ty=Math.sin(ang*Math.PI/180)*dist+'px';
    s.style.cssText=`--tx:${tx};--ty:${ty};left:${40+Math.random()*20}%;top:${20+Math.random()*20}%;width:${4+Math.random()*6}px;height:${4+Math.random()*6}px;border-radius:50%;background:${['#FFE14D','#4EFACC','#FF6BAE','#8B7FFF'][Math.floor(Math.random()*4)]};animation-duration:${0.6+Math.random()*0.4}s;animation-delay:${Math.random()*0.5}s;`;
    fw.appendChild(s);
    setTimeout(()=>s.remove(),1500);
  }
}

function proximaFase(){
  document.getElementById('overlay').classList.remove('ativo');
  const mIdx=ACERVO.indexOf(mundoAtual);
  const fIdx=mundoAtual.fases.indexOf(faseAtual);
  if(fIdx<mundoAtual.fases.length-1){
    iniciarFase(mIdx,mundoAtual.fases[fIdx+1].id);
  } else if(mIdx<ACERVO.length-1){
    iniciarFase(mIdx+1,ACERVO[mIdx+1].fases[0].id);
  } else {
    irMenu();
  }
}

// ═══════════════════════════════════════════════════════════════
//  NOME DO JOGADOR
// ═══════════════════════════════════════════════════════════════
function pedirNome(){
  if(!nomeJogador){
    document.getElementById('overlayNome').classList.add('ativo');
    setTimeout(()=>document.getElementById('inputNome').focus(),300);
  }
}
function salvarNome(){
  const val=document.getElementById('inputNome').value.trim();
  if(!val) return;
  nomeJogador=val;
  localStorage.setItem('roboV3nome',nomeJogador);
  document.getElementById('overlayNome').classList.remove('ativo');
  renderStats();
}
document.getElementById('inputNome').addEventListener('keydown',e=>{ if(e.key==='Enter')salvarNome(); });

// ═══════════════════════════════════════════════════════════════
//  BRINCABYTES SSO — AUTO-LOGIN
// ═══════════════════════════════════════════════════════════════
window.addEventListener('message', (event) => {
  if (event.data && event.data.type === 'BRINCABYTES_LOGIN') {
    const user = event.data.user;
    if (user && user.nome) {
      console.log('BrincaBytes Login Detectado:', user.nome);
      nomeJogador = user.nome;
      localStorage.setItem('roboV3nome', nomeJogador);
      document.getElementById('overlayNome').classList.remove('ativo');
      renderStats();
      
      // Feedback visual opcional
      if(typeof showToast === 'function') {
        showToast(`Bem-vindo, ${user.nome}!`);
      }
    }
  }
});

// ═══════════════════════════════════════════════════════════════
//  NAVEGAÇÃO
// ═══════════════════════════════════════════════════════════════
function irView(id){
  document.querySelectorAll('.view').forEach(v=>v.classList.remove('ativa'));
  document.getElementById(id).classList.add('ativa');
  window.scrollTo(0,0);
}
function irMenu(){
  pararTimer();
  document.getElementById('overlay').classList.remove('ativo');
  renderMenu();
  irView('menu');
}

document.getElementById('overlay').addEventListener('click',function(e){if(e.target===this)this.classList.remove('ativo');});

// ═══════════════════════════════════════════════════════════════
//  INIT
// ═══════════════════════════════════════════════════════════════
renderMenu();
pedirNome();
